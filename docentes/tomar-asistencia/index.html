<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESFM - Tomar Asistencia</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <div class="header">
            <h1><span class="title-line1">ESFM "Simón Bolívar"</span> <span class="title-line2">CORORO</span></h1>
            <div class="header-right">
                <button onclick="volverDocentes()" class="btn-secondary">← Volver</button>
                <div class="user-dropdown" id="user-dropdown-ta">
                    <button class="user-dropdown-btn" onclick="toggleUserDropdown('user-dropdown-ta')">
                        <span class="user-display-name"></span>
                        <span>▼</span>
                    </button>
                    <div class="user-dropdown-content">
                        <p><strong>Rol:</strong> <span class="dropdown-rol"></span></p>
                        <button onclick="cerrarSesion()" style="width:100%; margin-top:10px;">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">

            <!-- PASO 1: Seleccionar grupo -->
            <div id="paso-seleccion" class="card">
                <h2>📋 Tomar Asistencia</h2>
                <p class="subtitle">Selecciona el grupo para llamar lista</p>

                <div class="form-group">
                    <label>Especialidad</label>
                    <select id="sel-especialidad" onchange="cargarAnios()">
                        <option value="">-- Selecciona especialidad --</option>
                    </select>
                </div>

                <div class="form-group" id="grupo-anio" style="display:none;">
                    <label>Año de Formación</label>
                    <select id="sel-anio">
                        <option value="">-- Selecciona año --</option>
                    </select>
                </div>

                <button onclick="cargarLista()" class="btn-primary btn-full" id="btn-cargar" style="display:none;">
                    📋 Cargar Lista
                </button>
            </div>

            <!-- PASO 2: Lista de asistencia -->
            <div id="paso-lista" style="display:none;">
                <div class="lista-header">
                    <div>
                        <h2 id="lista-titulo"></h2>
                        <p id="lista-fecha" class="subtitle"></p>
                    </div>
                    <div class="contadores">
                        <span class="contador presente">P <span id="cnt-presente">0</span></span>
                        <span class="contador ausente">A <span id="cnt-ausente">0</span></span>
                    </div>
                </div>

                <div class="acciones-rapidas">
                    <button onclick="marcarTodos('PRESENTE')" class="btn-success">P Todos presentes</button>
                    <button onclick="marcarTodos('AUSENTE')" class="btn-danger">A Todos ausentes</button>
                </div>

                <div id="lista-estudiantes"></div>

                <div class="botones-accion">
                    <button onclick="cancelarLista()" class="btn-secondary">✕ Cancelar</button>
                    <button onclick="guardarAsistencia()" class="btn-primary btn-guardar">
                        💾 Guardar Asistencia
                    </button>
                </div>
            </div>

            <!-- PASO 3: Actualizar registro existente -->
            <div id="paso-actualizar" style="display:none;">
                <div class="lista-header">
                    <div>
                        <h2 id="act-titulo"></h2>
                        <p id="act-fecha" class="subtitle"></p>
                    </div>
                    <div class="contadores">
                        <span class="contador presente">P <span id="act-cnt-presente">0</span></span>
                        <span class="contador retraso">R <span id="act-cnt-retraso">0</span></span>
                        <span class="contador licencia">L <span id="act-cnt-licencia">0</span></span>
                        <span class="contador ausente">A <span id="act-cnt-ausente">0</span></span>
                    </div>
                </div>

                <p class="info-box">Solo puedes modificar los estudiantes marcados como <strong>Ausente</strong></p>

                <div id="lista-actualizar"></div>

                <div class="botones-accion">
                    <button onclick="volverSeleccion()" class="btn-secondary">✕ Cancelar</button>
                    <button onclick="volverSeleccion()" class="btn-primary">
                        ← Nueva asistencia
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script src="../../js/tursodb.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
