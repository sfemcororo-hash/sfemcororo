<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESFM - Ruleta</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <div class="header">
            <h1><span class="title-line1">ESFM "Simón Bolívar"</span> <span class="title-line2">CORORO</span></h1>
            <div class="header-right">
                <button onclick="volverDocentes()" class="btn-secondary">← Volver</button>
                <div class="user-dropdown" id="user-dropdown-ruleta">
                    <button class="user-dropdown-btn" onclick="toggleUserDropdown('user-dropdown-ruleta')">
                        <span class="user-display-name"></span>
                        <span>▼</span>
                    </button>
                    <div class="user-dropdown-content">
                        <p><strong>Rol:</strong> <span class="dropdown-rol"></span></p>
                        <button onclick="cerrarSesion()" style="width:100%; margin-top:10px;">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">

            <!-- VISTA 1: Selección -->
            <div id="vista-seleccion">
                <div class="card">
                    <h2>🎯 Ruleta de Participación</h2>
                    <p class="subtitle">Selecciona el grupo para iniciar</p>
                    <div class="form-group">
                        <label>Especialidad</label>
                        <select id="sel-especialidad" onchange="cargarAnios()">
                            <option value="">-- Selecciona --</option>
                        </select>
                    </div>
                    <div class="form-group" id="grupo-anio" style="display:none;">
                        <label>Año de Formación</label>
                        <select id="sel-anio" onchange="cargarMaterias()">
                            <option value="">-- Selecciona --</option>
                        </select>
                    </div>
                    <div class="form-group" id="grupo-materia" style="display:none;">
                        <label>Materia</label>
                        <select id="sel-materia" onchange="mostrarBtnIniciar()">
                            <option value="">-- Selecciona --</option>
                        </select>
                    </div>
                    <button onclick="iniciarRuleta()" class="btn-primary btn-full" id="btn-iniciar" style="display:none;">
                        🎯 Iniciar Ruleta
                    </button>
                    <button onclick="mostrarHistorial()" class="btn-historial btn-full" style="margin-top:10px;">
                        📋 Ver Historial de Sesiones
                    </button>
                </div>
            </div>

            <!-- VISTA 3: Historial -->
            <div id="vista-historial" style="display:none;">
                <div class="historial-header">
                    <h2 style="color:white;">📋 Historial de Sesiones</h2>
                    <button onclick="cerrarHistorial()" class="btn-secondary">← Volver</button>
                </div>
                <div id="historial-lista"></div>
            </div>

            <!-- VISTA 2: Ruleta -->
            <div id="vista-ruleta" style="display:none;">

                <div class="ruleta-header">
                    <div>
                        <h2 id="ruleta-titulo"></h2>
                        <p id="ruleta-info" class="subtitle"></p>
                    </div>
                    <button onclick="reiniciarRuleta()" class="btn-reiniciar">🔄 Reiniciar</button>
                </div>

                <!-- Ganador -->
                <div id="ganador-box" style="display:none;">
                    <div class="ganador-nombre" id="ganador-nombre"></div>
                    <div class="ganador-codigo" id="ganador-codigo"></div>
                </div>

                <!-- Ruleta canvas -->
                <div class="ruleta-wrapper">
                    <div class="ruleta-flecha">▼</div>
                    <canvas id="ruleta-canvas" width="340" height="340"></canvas>
                </div>

                <button onclick="girarRuleta()" class="btn-girar" id="btn-girar">🎯 Girar</button>

                <!-- Reporte de participantes -->
                <div class="reporte-box">
                    <h3 id="reporte-titulo">📋 Participantes</h3>
                    <div id="reporte-lista"></div>
                </div>

            </div>

        </div>
    </div>

    <script src="../../js/notifications.js"></script>
    <script src="../../js/tursodb.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
