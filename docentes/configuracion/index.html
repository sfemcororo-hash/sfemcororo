<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESFM - Configuración</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <div class="header">
            <h1><span class="title-line1">ESFM "Simón Bolívar"</span> <span class="title-line2">CORORO</span></h1>
            <div class="header-right">
                <button id="btn-volver" onclick="volverDocentes()" class="btn-secondary">← Volver</button>
                <div class="user-dropdown" id="user-dropdown-cfg">
                    <button class="user-dropdown-btn" onclick="toggleUserDropdown('user-dropdown-cfg')">
                        <span class="user-display-name"></span>
                        <span>▼</span>
                    </button>
                    <div class="user-dropdown-content">
                        <p><strong>Rol:</strong> <span class="dropdown-rol"></span></p>
                        <button onclick="cerrarSesion()" style="width:100%; margin-top:10px;">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">

            <!-- VISTA 1: Menú de configuración -->
            <div id="vista-menu">
                <div class="modules-grid">
                    <div class="module-card" onclick="mostrarVista('vista-materias')">
                        <div class="module-icon">📚</div>
                        <h3>Materias</h3>
                        <p>Gestionar materias por especialidad y año</p>
                    </div>
                    <div class="module-card" onclick="window.location.href='horarios/index.html'">
                        <div class="module-icon">🕐</div>
                        <h3>Horarios</h3>
                        <p>Definir horarios por materia y día</p>
                    </div>
                </div>
            </div>

            <!-- VISTA 2: Gestión de materias -->
            <div id="vista-materias" style="display:none;">

                <!-- Formulario agregar -->
                <div class="card">
                    <h2>📚 Gestión de Materias</h2>
                    <p class="subtitle">Agrega las materias por especialidad y año de formación</p>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Especialidad</label>
                            <select id="mat-especialidad" onchange="cargarAniosMaterias()">
                                <option value="">-- Selecciona --</option>
                            </select>
                        </div>
                        <div class="form-group" id="mat-grupo-anio" style="display:none;">
                            <label>Año de Formación</label>
                            <select id="mat-anio" onchange="cargarMaterias()">
                                <option value="">-- Selecciona --</option>
                            </select>
                        </div>
                    </div>

                    <div id="mat-form-agregar" style="display:none;">
                        <div class="form-group">
                            <label>Nombre de la Materia</label>
                            <div class="input-row">
                                <input type="text" id="mat-nombre" placeholder="Ej: Matemática Aplicada">
                                <button onclick="agregarMateria()" class="btn-primary">+ Agregar</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Lista de materias -->
                <div id="mat-lista-container" style="display:none;">
                    <h3 id="mat-lista-titulo" style="color:white; margin-bottom:12px;"></h3>
                    <div id="mat-lista"></div>
                </div>

                <div id="mat-sin-resultados" style="display:none;" class="card">
                    <p style="text-align:center; color:#666;">📭 No hay materias registradas para este grupo</p>
                </div>

                <button onclick="mostrarVista('vista-menu')" class="btn-secondary btn-full" style="margin-top:15px;">← Volver</button>
            </div>

        </div>
    </div>

    <script src="../../js/tursodb.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
