<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESFM - Registros Anteriores</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <div class="header">
            <h1><span class="title-line1">ESFM "Simón Bolívar"</span> <span class="title-line2">CORORO</span></h1>
            <div class="header-right">
                <button onclick="volverDocentes()" class="btn-secondary">← Volver</button>
                <div class="user-dropdown" id="user-dropdown-ra">
                    <button class="user-dropdown-btn" onclick="toggleUserDropdown('user-dropdown-ra')">
                        <span class="user-display-name"></span>
                        <span>▼</span>
                    </button>
                    <div class="user-dropdown-content">
                        <p><strong>Rol:</strong> <span class="dropdown-rol"></span></p>
                        <button onclick="cerrarSesion()" style="width:100%; margin-top:10px;">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="card">
                <h2>📅 Registros Anteriores</h2>
                <p class="subtitle">Selecciona una fecha para ver los registros</p>
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" id="input-fecha">
                </div>
                <button onclick="buscarRegistros()" class="btn-primary btn-full">🔍 Buscar</button>
            </div>

            <div id="registros-dia" style="display:none;">
                <h3 id="titulo-fecha" style="color:white; margin-bottom:12px;"></h3>
                <div id="lista-registros"></div>
            </div>

            <div id="sin-resultados" style="display:none;" class="card">
                <p style="text-align:center; color:#666;">📭 No hay registros para esta fecha</p>
            </div>
        </div>
    </div>

    <script src="../../js/tursodb.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
