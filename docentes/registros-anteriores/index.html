<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESFM - Registros Anteriores</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <div class="header">
            <h1><span class="title-line1">ESFM "Simón Bolívar"</span> <span class="title-line2">CORORO</span></h1>
            <div class="header-right">
                <button id="btn-volver" onclick="volverDocentes()" class="btn-secondary">← Volver</button>
                <div class="user-dropdown" id="user-dropdown-ra">
                    <button class="user-dropdown-btn" onclick="toggleUserDropdown('user-dropdown-ra')">
                        <span class="user-display-name"></span>
                        <span>▼</span>
                    </button>
                    <div class="user-dropdown-content">
                        <p><strong>Rol:</strong> <span class="dropdown-rol"></span></p>
                        <button onclick="cerrarSesion()" style="width:100%; margin-top:10px;">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">

            <!-- VISTA 1: Buscar por fecha -->
            <div id="vista-buscar">
                <div class="card">
                    <h2>📅 Registros Anteriores</h2>
                    <p class="subtitle">Selecciona una fecha para ver los registros</p>
                    <div class="form-group">
                        <label>Fecha</label>
                        <input type="date" id="input-fecha">
                    </div>
                    <button onclick="buscarRegistros()" class="btn-primary btn-full">🔍 Buscar</button>
                </div>

                <div id="registros-dia" style="display:none;">
                    <h3 id="titulo-fecha" style="color:white; margin-bottom:12px;"></h3>
                    <div id="lista-registros"></div>
                </div>

                <div id="sin-resultados" style="display:none;" class="card">
                    <p style="text-align:center; color:#666;">📭 No hay registros para esta fecha</p>
                </div>
            </div>

            <!-- VISTA 2: Detalle de un registro -->
            <div id="vista-detalle" style="display:none;">
                <div class="lista-header">
                    <div>
                        <h2 id="det-titulo"></h2>
                        <p id="det-info" class="subtitle"></p>
                    </div>
                    <div class="contadores">
                        <span class="contador presente">P <span id="det-cnt-presente">0</span></span>
                        <span class="contador retraso">R <span id="det-cnt-retraso">0</span></span>
                        <span class="contador licencia">L <span id="det-cnt-licencia">0</span></span>
                        <span class="contador ausente">A <span id="det-cnt-ausente">0</span></span>
                    </div>
                </div>

                <div id="lista-detalle"></div>

                <div class="botones-accion">
                    <button onclick="volverABuscar()" class="btn-secondary">← Volver</button>
                </div>
            </div>

        </div>
    </div>

    <script src="../../js/tursodb.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
